[tool.poetry]
name = "project-manager"
version = "0.1.0"
description = "Universal Git-like Project Metadata Registry"
authors = ["Your Name <you@example.com>"]
packages = [{ include = "manager" }]

[tool.poetry.dependencies]
python = "^3.10"
typer = "^0.9"
pyyaml = "^6.0"
sqlite-utils = "^3.35"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4"
black = "^24.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
